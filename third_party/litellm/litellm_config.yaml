model_list:                                                                                  
    # OpenAI 模型（需要 OPENAI_API_KEY）
    - model_name: gpt-5.4                                                                      
      litellm_params:                                                                          
        model: openai/gpt-5.4                                                                  
        api_key: os.environ/OPENAI_API_KEY
    # claude 模型
    - model_name: claude-4.5-haiku-20251001
      litellm_params:
        model: anthropic/claude-4.5-haiku-20251001
        api_key: os.environ/ANTHROPIC_API_KEY

    # vLLM 本地模型（OpenAI 兼容协议）
    - model_name: Qwen3.5-35B
      litellm_params:
        model: openai/Qwen3.5-35B
        api_base: http://localhost:8000/v1
        api_key: token-placeholder

general_settings:                                                                            
    master_key: sk-litellm-master-key   # LiteLLM 自身的认证 key                             
                                                                                               
litellm_settings:                                                                            
  drop_params: true      # 自动丢弃目标模型不支持的参数                                      
  set_verbose: false                                                                         
  