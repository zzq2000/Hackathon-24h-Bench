system:
  type: message_queue
  description: "AMQP 0.9.1 message queue"
  target_dir: ./workspace/message_queue
  default_port: 5672

docker:
  network_mode: "host"
  add_host_gateway: true

message_queue:
  data_dir: ./data

benchmarks:
  - name: mq_bench
    enabled: true

mq_bench:
  network_mode: "host"
  pika_repo: "https://github.com/pika/pika.git"
  pika_test_timeout_sec: 30
  omq_docker_image: "pivotalrabbitmq/omq"
  perftest_docker_image: "pivotalrabbitmq/perf-test"

tiers:
  L0:
    description: "L0: AMQP protocol correctness (pika acceptance tests)"
    timeout_multiplier: 1.0
    mq_bench:
      suites: [pika]
  L1:
    description: "L1: Correctness + basic performance (omq)"
    timeout_multiplier: 1.5
    mq_bench:
      suites: [omq]
  L2:
    description: "L2: Full benchmark (perftest)"
    timeout_multiplier: 2.0
    mq_bench:
      suites: [perftest]

feedback:
  file: last_brief.txt
  format: text
